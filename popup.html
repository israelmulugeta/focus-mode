<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Extension</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>Focus Extension</h1>

      <section class="panel">
        <h2>Focus Session</h2>
        <div id="setup-view">
          <label>
            Current task
            <input id="task-input" type="text" maxlength="120" placeholder="e.g. Write project proposal" />
          </label>

          <label>
            Duration (minutes)
            <input id="duration-input" type="number" min="1" max="300" value="25" />
          </label>

          <button id="start-btn">Start Session</button>
        </div>

        <div id="active-view" class="hidden">
          <p><strong>Task:</strong> <span id="active-task"></span></p>
          <p><strong>Time remaining:</strong> <span id="remaining-time"></span></p>
          <button id="end-btn" class="danger">End Session</button>
        </div>
      </section>

      <section class="panel">
        <h2>Grayscale</h2>
        <label class="checkbox-label">
          <input id="grayscale-toggle" type="checkbox" />
          Enable Grayscale
        </label>
      </section>

      <section class="panel">
        <h2>Custom Blocked Sites</h2>
        <div class="row">
          <input id="blocked-site-input" type="text" placeholder="example.com or example.com/path" />
          <button id="add-blocked-site-btn" class="secondary">Add</button>
        </div>
        <ul id="blocked-sites-list" class="site-list"></ul>
      </section>

      <p id="status" role="status"></p>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
